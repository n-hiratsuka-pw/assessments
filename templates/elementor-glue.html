<link
  rel="stylesheet"
  href="https://n-hiratsuka-pw.github.io/assessments/common/core-style.css?v=3"
/>

<div class="diag-container js-diag-container">
  <div class="diag-header">
    <div id="diag-main-title" class="diag-main-title"></div>

    <div
      class="progress-info"
      style="
        margin-bottom: 10px;
        font-weight: bold;
        color: #666;
        font-size: 15px;
        text-align: center;
      "
    >
      診断完了まで あと
      <span
        id="remaining-steps"
        style="color: var(--diag-accent); font-size: 18px"
      ></span>
      問
    </div>
    <div class="progress-outer">
      <div id="progress-inner" class="progress-inner"></div>
    </div>
  </div>

  <div id="diag-content">
    <div style="text-align: center; padding: 30px; color: #999">
      診断システムを読み込み中...
    </div>
  </div>

  <div id="diag-footer" class="diag-footer hidden">
    <button type="button" id="prev-btn" class="nav-btn prev">← 戻る</button>
    <button type="button" id="next-btn" class="nav-btn next">次へ進む</button>
  </div>
</div>

<script src="https://n-hiratsuka-pw.github.io/assessments/common/engine.js?v=3"></script>
<script src="https://n-hiratsuka-pw.github.io/assessments/jiritu-assessment/base-config.js?v=3"></script>
<script
  src="https://n-hiratsuka-pw.github.io/assessments/jiritu-assessment/settings/[ID].js?v=3"
  onerror="console.info('個別設定なし')"
></script>

<script>
  (function () {
    var attempts = 0;
    var timer = setInterval(function () {
      if (
        typeof window.AssessmentEngine !== "undefined" &&
        typeof DIAG_BASE_CONFIG !== "undefined"
      ) {
        // まだ起動していない新鮮なHTML要素だけを探す
        var containers = document.querySelectorAll(
          ".js-diag-container:not([data-initialized='true'])",
        );
        if (containers.length > 0) {
          clearInterval(timer);
          var container = containers[0];
          container.dataset.initialized = "true";

          // ★Elementorのバグを回避するため、毎回ユニークなIDを自動で付ける
          var uniqueId = "diag-app-" + Math.random().toString(36).substr(2, 9);
          container.id = uniqueId;

          window.diagApp = new window.AssessmentEngine(uniqueId);
        }
      } else if (attempts > 50) {
        clearInterval(timer);
        var errContainers = document.querySelectorAll(
          ".js-diag-container:not([data-initialized='true']) #diag-content",
        );
        if (errContainers.length > 0) {
          errContainers[0].innerHTML =
            "<div style='text-align:center; padding: 20px; color:red;'>読み込みエラーが発生しました。設定ファイルの記述を確認してください。</div>";
        }
      }
      attempts++;
    }, 200);
  })();
</script>
