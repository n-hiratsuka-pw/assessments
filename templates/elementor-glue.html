<link
  rel="stylesheet"
  href="https://n-hiratsuka-pw.github.io/assessments/common/core-style.css"
/>

<div id="diag-app" class="diag-container">
  <div class="diag-header" style="position: relative">
    <button
      type="button"
      class="js-close-btn"
      style="
        position: absolute;
        top: -10px;
        right: 0;
        background: none;
        border: none;
        font-size: 28px;
        cursor: pointer;
        color: #aaa;
        line-height: 1;
        padding: 0;
      "
    >
      &times;
    </button>
    <div
      class="progress-info"
      style="margin-bottom: 10px; font-weight: bold; color: #666"
    >
      Step <span id="current-step-num">1</span> /
      <span id="total-steps">3</span>
    </div>
    <div class="progress-outer">
      <div id="progress-inner" class="progress-inner"></div>
    </div>
  </div>

  <div id="diag-content">
    <div style="text-align: center; padding: 30px; color: #999">
      診断システムを読み込み中...
    </div>
  </div>

  <div id="diag-footer" class="diag-footer hidden">
    <button type="button" id="prev-btn" class="nav-btn prev">← 戻る</button>
    <button type="button" id="next-btn" class="nav-btn next">次へ進む</button>
  </div>
</div>

<script src="https://n-hiratsuka-pw.github.io/assessments/common/engine.js"></script>
<script src="https://n-hiratsuka-pw.github.io/assessments/jiritu-assessment/base-config.js"></script>
<script
  src="https://n-hiratsuka-pw.github.io/assessments/jiritu-assessment/settings/[ID].js"
  onerror="console.info('個別設定なし')"
></script>

<script>
  (function () {
    var attempts = 0;
    var timer = setInterval(function () {
      // 必要なJSファイルが完全に揃ったかチェック（window.AssessmentEngine に変更）
      if (
        typeof window.AssessmentEngine !== "undefined" &&
        typeof DIAG_BASE_CONFIG !== "undefined"
      ) {
        clearInterval(timer);

        // Elementorでプレビューが更新されて新しい枠が作られたら、何度でも再起動させる
        var container = document.getElementById("diag-app");
        if (container && !container.dataset.initialized) {
          container.dataset.initialized = "true"; // 二重起動防止マーク
          window.diagApp = new window.AssessmentEngine("diag-app");
        }
      } else if (attempts > 50) {
        clearInterval(timer);
        var errContainer = document.getElementById("diag-content");
        if (errContainer) {
          errContainer.innerHTML =
            "<div style='text-align:center; padding: 20px; color:red;'>読み込みエラーが発生しました。設定ファイルの記述を確認してください。</div>";
        }
      }
      attempts++;
    }, 200);
  })();
</script>
