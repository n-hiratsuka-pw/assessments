<link
  rel="stylesheet"
  href="https://n-hiratsuka-pw.github.io/assessments/common/core-style.css?v=4"
/>

<div class="diag-container js-diag-container">
  <div
    class="diag-header"
    style="
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #eee;
      padding-bottom: 8px;
      margin-bottom: 10px;
    "
  >
    <div
      id="diag-main-title"
      class="diag-main-title"
      style="
        margin: 0;
        padding: 0;
        border: none;
        font-size: 16px;
        text-align: left;
        line-height: 1.3;
        color: #333;
        font-weight: bold;
      "
    ></div>
    <div
      class="progress-info"
      style="
        font-weight: bold;
        color: #666;
        font-size: 13px;
        white-space: nowrap;
        margin-left: 10px;
      "
    >
      あと
      <span
        id="remaining-steps"
        style="color: var(--diag-accent); font-size: 18px"
      ></span>
      問
    </div>
  </div>

  <div id="diag-content">
    <div style="text-align: center; padding: 30px; color: #999">
      診断システムを読み込み中...
    </div>
  </div>

  <div id="diag-footer" class="diag-footer hidden">
    <button type="button" id="prev-btn" class="nav-btn prev">← 戻る</button>
    <button type="button" id="next-btn" class="nav-btn next">次へ進む</button>
  </div>
</div>

<script src="https://n-hiratsuka-pw.github.io/assessments/common/engine.js?v=4"></script>
<script src="https://n-hiratsuka-pw.github.io/assessments/jiritu-assessment/base-config.js?v=4"></script>
<script
  src="https://n-hiratsuka-pw.github.io/assessments/jiritu-assessment/settings/[ID].js?v=4"
  onerror="console.info('個別設定なし')"
></script>

<script>
  (function () {
    var attempts = 0;
    var timer = setInterval(function () {
      if (
        typeof window.AssessmentEngine !== "undefined" &&
        typeof DIAG_BASE_CONFIG !== "undefined"
      ) {
        var containers = document.querySelectorAll(
          ".js-diag-container:not([data-initialized='true'])",
        );
        if (containers.length > 0) {
          clearInterval(timer);
          var container = containers[0];
          container.dataset.initialized = "true";
          var uniqueId = "diag-app-" + Math.random().toString(36).substr(2, 9);
          container.id = uniqueId;
          window.diagApp = new window.AssessmentEngine(uniqueId);
        }
      } else if (attempts > 50) {
        clearInterval(timer);
        var errContainers = document.querySelectorAll(
          ".js-diag-container:not([data-initialized='true']) #diag-content",
        );
        if (errContainers.length > 0) {
          errContainers[0].innerHTML =
            "<div style='text-align:center; padding: 20px; color:red;'>読み込みエラーが発生しました。設定ファイルの記述を確認してください。</div>";
        }
      }
      attempts++;
    }, 200);
  })();
</script>
